---
# GKE Lab — Helm values override for the payments-api chart
# Usage: helm upgrade --install payments-api helm/payments-api \
#          --namespace payments --create-namespace \
#          --values helm/payments-api/values.dev.yaml

# Use httpbin as our demo workload (real app image would go here)
image:
  repository: kennethreitz/httpbin
  tag: "latest"
  pullPolicy: Always

# Override probe paths to work with httpbin
livenessProbe:
  httpGet:
    path: /get
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /get
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

startupProbe:
  httpGet:
    path: /get
    port: http
  failureThreshold: 30
  periodSeconds: 10

# Workload Identity — links this K8s SA to the GCP SA
serviceAccount:
  create: true
  name: payments-api
  annotations:
    iam.gke.io/gcp-service-account: "gke-labs-payments-api@gke-labs.iam.gserviceaccount.com"

# Cloud SQL Auth Proxy sidecar
cloudsqlProxy:
  enabled: true
  connectionName: "gke-labs:europe-west1:gke-labs-postgres-dev"
  image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.4
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# External Secrets Operator integration
# Reads from GCP Secret Manager, creates K8s Secrets automatically
externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secrets:
    - name: payments-api-secrets
      data:
        - secretKey: DB_PASSWORD
          remoteRef:
            key: payments-api-db-password
        - secretKey: REDIS_AUTH
          remoteRef:
            key: payments-api-redis-auth
        - secretKey: JWT_SECRET
          remoteRef:
            key: payments-api-jwt-secret

# Smaller resource footprint for dev
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Scale down for dev cost savings
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# 1 replica min is fine for dev
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Schedule on application nodes
nodeSelector:
  role: application

# Spread across zones for resilience practice
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: payments-api
