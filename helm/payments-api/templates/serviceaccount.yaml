{{/*
serviceaccount.yaml — Kubernetes ServiceAccount for payments-api.

Conditionally created when .Values.serviceAccount.create=true.
Supports Workload Identity via optional annotations (e.g. the GKE
iam.gke.io/gcp-service-account annotation is injected per environment
through values.<env>.yaml overlays).
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "payments-api.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "payments-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
