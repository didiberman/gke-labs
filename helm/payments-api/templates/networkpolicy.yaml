{{/*
networkpolicy.yaml — NetworkPolicy for payments-api.

Security model:
  INGRESS: Deny all by default.
    Allow from ingress-nginx namespace → port 80  (inbound HTTP traffic)
    Allow from monitoring namespace   → port 80  (Prometheus scrape)

  EGRESS: Allow all.
    The application requires outbound access to:
      - Cloud SQL Auth Proxy (Unix socket, localhost)
      - Redis / Memorystore (TCP 6379)
      - GCP APIs: Secret Manager, IAM, etc. (TCP 443)
      - kube-dns (UDP/TCP 53)

Conditionally created when networkPolicy.enabled=true.
*/}}
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "payments-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "payments-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "payments-api.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # ------------------------------------------------------------------
    # Allow ingress from the ingress-nginx controller namespace.
    # GKE uses the namespace label kubernetes.io/metadata.name which is
    # automatically set to the namespace name by the API server.
    # ------------------------------------------------------------------
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}

    # ------------------------------------------------------------------
    # Allow ingress from the monitoring namespace so Prometheus can
    # scrape the /metrics endpoint (same port as HTTP traffic).
    # ------------------------------------------------------------------
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}

  # ------------------------------------------------------------------
  # Allow all egress.
  # An empty egress rule is equivalent to "permit all" so the pod can
  # reach Cloud SQL, Redis, GCP APIs, and kube-dns without restriction.
  # Tighten this per-environment once destination CIDRs are known.
  # ------------------------------------------------------------------
  egress:
    - {}
{{- end }}
