{{/*
secret-db-credentials.yaml
Provides the `temporal-db-credentials` Secret containing the database password.

Two modes, controlled by cloudSql.useExternalSecrets:

  true  (default) — creates an ExternalSecret that fetches the password from
                    GCP Secret Manager via External Secrets Operator (ESO).
                    Requires the SecretStore/ClusterSecretStore to be configured
                    with a GCP backend.

  false           — creates a plain Kubernetes Secret directly from the Helm
                    value cloudSql.dbPassword.  Use this in air-gapped or
                    bootstrapping scenarios where ESO is not yet available.
                    WARNING: the plain-text value will appear in Helm release
                    history; prefer ESO or Vault for production.
*/}}

{{- if .Values.cloudSql.useExternalSecrets }}
# ---------------------------------------------------------------------------
# ExternalSecret — fetches the database password from GCP Secret Manager.
# Requires External Secrets Operator >= 0.9 and a GCP SecretStore named
# "gcp-secrets-store" in the same namespace (or a ClusterSecretStore).
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: temporal-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "temporal-wrapper.labels" . | nindent 4 }}
  annotations:
    # Refresh the secret every hour to pick up rotated credentials automatically.
    external-secrets.io/refresh-interval: "1h"
spec:
  # How often ESO should reconcile this secret against Secret Manager.
  refreshInterval: 1h

  secretStoreRef:
    # Name of the SecretStore (or ClusterSecretStore) that holds GCP credentials.
    # This must already exist in the cluster — see labs/05-secret-manager for setup.
    name: gcp-secrets-store
    kind: SecretStore

  target:
    name: temporal-db-credentials
    creationPolicy: Owner
    # Merge into existing Secret if present; useful when another chart also
    # populates this Secret with additional keys.
    deletionPolicy: Retain

  data:
    - secretKey: password
      remoteRef:
        # Key in GCP Secret Manager — set via cloudSql.secretManagerKey.
        key: {{ .Values.cloudSql.secretManagerKey | quote }}
        # Fetch the latest active version.
        version: "latest"
        # The password is stored as a plain string in Secret Manager.
        decodingStrategy: None

{{- else }}
# ---------------------------------------------------------------------------
# Plain Kubernetes Secret — password supplied directly via Helm value.
# Only use in non-production or bootstrapping scenarios.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: temporal-db-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "temporal-wrapper.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
type: Opaque
stringData:
  password: {{ required "cloudSql.dbPassword must be set when cloudSql.useExternalSecrets is false" .Values.cloudSql.dbPassword | quote }}
{{- end }}
